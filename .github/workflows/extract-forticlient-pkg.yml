# .github/workflows/extract-forticlient-pkg.yml

name: Extract FortiClient VPN PKG

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: "Direct stub DMG download URL (from Fortinet downloads page)"
        required: true
        type: string
      force_release:
        description: "Re-release even if this version tag already exists"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 1"

jobs:
  extract-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Download stub installer ───────────────────────────────────────────
      - name: Download FortiClient stub installer DMG
        run: |
          URL="${{ inputs.download_url || vars.FORTICLIENT_DMG_URL }}"

          if [ -z "$URL" ]; then
            echo "ERROR: No download URL provided."
            echo "  Manual run:   fill in the 'download_url' input."
            echo "  Scheduled run: set FORTICLIENT_DMG_URL in repo Actions variables."
            exit 1
          fi

          echo "Downloading stub from: $URL"
          curl -L --retry 3 --retry-delay 10 --progress-bar \
            -o FortiClientStub.dmg "$URL"

          ls -lh FortiClientStub.dmg

      # ── 2. Mount stub DMG ────────────────────────────────────────────────────
      - name: Mount stub DMG
        run: |
          ATTACH_OUT=$(hdiutil attach FortiClientStub.dmg -nobrowse -noverify)
          echo "$ATTACH_OUT"

          STUB_VOLUME=$(echo "$ATTACH_OUT" | awk '/\/Volumes\//{print $NF}')
          if [ -z "$STUB_VOLUME" ]; then
            echo "ERROR: Could not determine stub DMG mount point."
            exit 1
          fi

          echo "Stub mounted at: $STUB_VOLUME"
          echo "STUB_VOLUME=$STUB_VOLUME" >> $GITHUB_ENV

      # ── 3. Run FortiClientInstaller binary to download the full installer ────
      #
      # This binary lives at Contents/MacOS/FortiClientInstaller inside the DMG.
      # When run with sudo it downloads the real FortiClient installer to a temp
      # folder and prints a line like:
      #   "Download FortiClient Connect successfully. Copy it to /var/folders/.../FortiClient.dmg"
      #
      - name: Run FortiClientInstaller binary
        timeout-minutes: 15
        run: |
          INSTALLER=$(find "$STUB_VOLUME" -name "FortiClientInstaller" -type f | head -1)

          if [ -z "$INSTALLER" ]; then
            echo "ERROR: FortiClientInstaller binary not found under $STUB_VOLUME"
            echo "Contents of stub DMG:"
            find "$STUB_VOLUME" -type f
            exit 1
          fi

          echo "Found binary: $INSTALLER"

          # Run with sudo; tee captures both stdout and stderr for path parsing
          sudo "$INSTALLER" > /tmp/fc_installer.log 2>&1 || true

          echo "=== Installer output ==="
          cat /tmp/fc_installer.log

      # ── 4. Parse the downloaded full-installer DMG path from log output ──────
      - name: Parse full installer DMG path from log
        run: |
          # Target log line:
          # "Download FortiClient Connect successfully. Copy it to /var/folders/.../FortiClient.dmg"
          FULL_DMG=$(grep "Copy it to" /tmp/fc_installer.log \
            | grep -oE '/var/folders/[^ ]+' \
            | tail -1)

          # Fallback: scan /var/folders for any FortiClient DMG newer than the stub
          if [ -z "$FULL_DMG" ]; then
            echo "Primary parse found nothing — falling back to filesystem search..."
            FULL_DMG=$(find /var/folders -name "FortiClient*.dmg" \
              -newer FortiClientStub.dmg 2>/dev/null | head -1)
          fi

          if [ -z "$FULL_DMG" ] || [ ! -f "$FULL_DMG" ]; then
            echo "ERROR: Could not locate downloaded FortiClient DMG."
            echo "Full installer log:"
            cat /tmp/fc_installer.log
            exit 1
          fi

          echo "Full installer DMG: $FULL_DMG"
          ls -lh "$FULL_DMG"
          echo "FULL_DMG=$FULL_DMG" >> $GITHUB_ENV

      # ── 5. Mount the full installer DMG ─────────────────────────────────────
      - name: Mount full installer DMG
        run: |
          ATTACH_OUT=$(hdiutil attach "$FULL_DMG" -nobrowse -noverify)
          echo "$ATTACH_OUT"

          FULL_VOLUME=$(echo "$ATTACH_OUT" | awk '/\/Volumes\//{print $NF}')
          if [ -z "$FULL_VOLUME" ]; then
            echo "ERROR: Could not mount full installer DMG."
            exit 1
          fi

          echo "Full installer mounted at: $FULL_VOLUME"
          ls -la "$FULL_VOLUME"
          echo "FULL_VOLUME=$FULL_VOLUME" >> $GITHUB_ENV

      # ── 6. Detect version ────────────────────────────────────────────────────
      - name: Detect version
        run: |
          PKG_SRC=$(find "$FULL_VOLUME" \( -name "*.pkg" -o -name "*.mpkg" \) | head -1)
          echo "PKG source: $PKG_SRC"

          # Best source: Distribution XML inside the package
          pkgutil --expand "$PKG_SRC" /tmp/fc_expanded 2>/dev/null || true
          VERSION=$(grep -oE 'version="[0-9][0-9.]*"' \
            /tmp/fc_expanded/Distribution 2>/dev/null \
            | head -1 | grep -oE '[0-9][0-9.]*')

          # Fallback: parse from the DMG volume label
          if [ -z "$VERSION" ]; then
            VERSION=$(echo "$FULL_VOLUME" \
              | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
          fi

          # Last resort: date stamp so the workflow never hard-fails
          if [ -z "$VERSION" ]; then
            VERSION=$(date +%Y.%m.%d)
            echo "WARNING: Version not detected — using date fallback: $VERSION"
          fi

          echo "Detected version: $VERSION"
          echo "VERSION=$VERSION"   >> $GITHUB_ENV
          echo "PKG_SRC=$PKG_SRC"  >> $GITHUB_ENV

      # ── 7. Check for duplicate release ──────────────────────────────────────
      - name: Check if release already exists
        id: check_release
        run: |
          TAG="v${{ env.VERSION }}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")

          if [ "$HTTP" = "200" ] && [ "${{ inputs.force_release }}" != "true" ]; then
            echo "Release $TAG already exists — skipping."
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      # ── 8. Copy PKG with stable filename ────────────────────────────────────
      - name: Stage PKG with stable filename
        if: steps.check_release.outputs.SKIP != 'true'
        run: |
          # Fixed filename is what makes /releases/latest/download/FortiClientVPN.pkg stable
          cp "$PKG_SRC" FortiClientVPN.pkg
          ls -lh FortiClientVPN.pkg

      # ── 9. Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.check_release.outputs.SKIP != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "FortiClient VPN ${{ env.VERSION }}"
          make_latest: true
          body: |
            **FortiClient VPN** — macOS offline installer PKG

            | Field | Value |
            |---|---|
            | Version | `${{ env.VERSION }}` |
            | Run | `${{ github.run_id }}` |
            | Trigger | `${{ github.event_name }}` |

            > PKG extracted from the official Fortinet stub installer for Mosyle MDM deployment.
            >
            > **Stable MDM URL (never changes):**
            > `https://github.com/${{ github.repository }}/releases/latest/download/FortiClientVPN.pkg`
          files: FortiClientVPN.pkg

      # ── 10. Cleanup (always runs) ────────────────────────────────────────────
      - name: Detach DMG volumes
        if: always()
        run: |
          hdiutil detach "${{ env.FULL_VOLUME }}" -quiet 2>/dev/null || true
          hdiutil detach "${{ env.STUB_VOLUME }}"  -quiet 2>/dev/null || true
